global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend metrics assuming django-prometheus is installed (optional but good practice)
  # - job_name: 'django'
  #   metrics_path: '/api/v1/metrics'
  #   static_configs:
  #     - targets: ['api:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
